name: CI

on:
  push:
    branches: [master, main]
    tags:
      - "*"
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  PLUGIN_NAME: MagicAudioControl
  BINARY_NAME: open-deck-audio-control
  TARGET: x86_64-unknown-linux-gnu

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: magic-audio-control
          cache-targets: false

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --release --all-targets

      - name: Run tests
        run: cargo test --all-targets

  release:
    needs: ci
    if: startsWith(github.ref, 'refs/tags/')

    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Parse version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --target ${{ env.TARGET }}

      - name: Install SVG converter
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Convert SVG icons to PNG
        run: |
          mkdir -p icons propertyInspector
          rsvg-convert -w 256 -h 256 assets/icons/plugin.svg > icon.png
          rsvg-convert -w 144 -h 144 assets/icons/cycle-stream.svg > icons/cycle-stream.png
          rsvg-convert -w 144 -h 144 assets/icons/volume-knob.svg > icons/volume-knob.png

      - name: Copy property inspector
        run: cp -r assets/propertyInspector/. propertyInspector/

      - name: Build release manifest
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("assets/manifest.json").read_text())
          manifest["Version"] = "${{ steps.version.outputs.version }}"
          manifest["icon"] = "icon.png"
          manifest["CodePath"] = "${{ env.BINARY_NAME }}"
          manifest["CodePathLin"] = "${{ env.BINARY_NAME }}"
          manifest["CodePaths"] = {
              "x86_64-unknown-linux-gnu": "${{ env.BINARY_NAME }}"
          }

          Path("manifest.json").write_text(json.dumps(manifest, indent=2) + "\n")
          PY

      - name: Copy release binary
        run: cp "target/${{ env.TARGET }}/release/${{ env.BINARY_NAME }}" "${{ env.BINARY_NAME }}"

      - name: Package .streamDeckPlugin
        run: |
          zip -r "${{ env.PLUGIN_NAME }}.streamDeckPlugin" \
            manifest.json \
            icon.png \
            icons/ \
            propertyInspector/ \
            "${{ env.BINARY_NAME }}"
          ls -la "${{ env.PLUGIN_NAME }}.streamDeckPlugin"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.0.1
        with:
          draft: false
          prerelease: false
          tag_name: ${{ github.ref }}
          release_name: "Magic Audio Control ${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: "${{ env.PLUGIN_NAME }}.streamDeckPlugin"
