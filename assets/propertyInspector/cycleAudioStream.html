<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        let websocket = null;
        let context = null;
        let currentSettings = {};

        function connectElgatoStreamDeckSocket(inPort, inPropertyInspectorUUID, inRegisterEvent, inInfo, inActionInfo) {
            console.log("[PI] connectElgatoStreamDeckSocket called, port:", inPort);
            
            websocket = new WebSocket("ws://localhost:" + inPort);
            const actionInfo = JSON.parse(inActionInfo);
            context = inPropertyInspectorUUID;
            currentSettings = actionInfo.payload.settings || {};

            websocket.onopen = () => {
                console.log("[PI] WebSocket connected");
                websocket.send(JSON.stringify({
                    event: inRegisterEvent,
                    uuid: inPropertyInspectorUUID,
                }));
                console.log("[PI] Sent registration");
            };

            websocket.onmessage = (event) => {
                console.log("[PI] Received message:", event.data);
                try {
                    const message = JSON.parse(event.data);
                    console.log("[PI] Parsed message:", message);
                    if (message.event === "sendToPropertyInspector" && message.payload) {
                        const payload = message.payload;
                        if (payload.event === "updateInfo") {
                            console.log("[PI] updateInfo received, link_id:", payload.link_id);
                            document.getElementById("linkId").innerText = payload.link_id || "Not set";
                            renderStreams(payload.streams);
                        }
                    }
                } catch (e) {
                    console.error("[PI] Error parsing message:", e);
                }
            };

            websocket.onerror = (error) => {
                console.error("[PI] WebSocket error:", error);
            };

            websocket.onclose = () => {
                console.log("[PI] WebSocket closed");
            };
        }

        function renderStreams(streams) {
            console.log("[PI] renderStreams called, streams:", streams);
            const container = document.getElementById("streamList");
            if (!streams || streams.length === 0) {
                container.innerHTML = '<div style="padding: 8px; color: #888; font-size: 11px;">No active audio streams</div>';
                return;
            }
            const currentNodeId = currentSettings.current_node_id;
            container.innerHTML = streams.map(s => {
                const isCurrent = s.node_id === currentNodeId ? ' ✓' : '';
                return `<div style="padding: 4px 8px; border-bottom: 1px solid #333; font-size: 11px;">${s.app_name || s.name}${isCurrent}</div>`;
            }).join('');
        }
    </script>
    <link rel="stylesheet" href="sdpi.css" />
</head>
<body>
    <div class="sdpi-item">
        <div class="sdpi-item-label">Button ID</div>
        <div id="linkId" style="padding: 8px; background: #222; border-radius: 4px; font-family: monospace; font-size: 12px;">Loading...</div>
    </div>
    <p style="padding: 0.5rem; font-size: 10px; color: #888;">
        This ID is auto-generated. Use it in a Volume Control knob to link them.
    </p>
    <div class="sdpi-item">
        <div class="sdpi-item-label">Active Streams</div>
        <div id="streamList" style="background: #222; border-radius: 4px; max-height: 120px; overflow-y: auto;">
            <div style="padding: 8px; color: #888; font-size: 11px;">Loading...</div>
        </div>
    </div>
</body>
</html>
