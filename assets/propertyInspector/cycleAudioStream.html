<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle Audio Stream</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 12px;
            background: #1a1a1a;
            color: #e0e0e0;
        }
        .section {
            margin-bottom: 16px;
        }
        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .stream-list {
            background: #252525;
            border-radius: 6px;
            padding: 8px;
            max-height: 300px;
            overflow-y: auto;
        }
        .stream-item {
            padding: 8px;
            border-bottom: 1px solid #333;
        }
        .stream-item:last-child {
            border-bottom: none;
        }
        .stream-name {
            font-weight: 500;
            color: #fff;
        }
        .stream-pid {
            font-size: 11px;
            color: #888;
            margin-top: 2px;
        }
        .current-badge {
            display: inline-block;
            background: #4a9eff;
            color: #fff;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            margin-left: 8px;
        }
        .empty-state {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        .refresh-btn {
            background: #4a9eff;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 8px;
        }
        .refresh-btn:hover {
            background: #3a8eef;
        }
    </style>
</head>
<body>
    <div class="section">
        <div class="section-title">Active Audio Streams</div>
        <div id="streamList" class="stream-list">
            <div class="empty-state">Loading streams...</div>
        </div>
        <button class="refresh-btn" onclick="refreshStreams()">Refresh</button>
    </div>

    <script>
        let websocket = null;
        let currentSettings = {};
        let context = null;

        function connectElgatoStreamDeckSocket(inPort, inPropertyInspectorUUID, inRegisterEvent, inInfo, inActionInfo) {
            const actionInfo = JSON.parse(inActionInfo);
            context = inPropertyInspectorUUID;
            currentSettings = actionInfo.payload.settings || {};

            websocket = new WebSocket("ws://localhost:" + inPort);

            websocket.onopen = function() {
                websocket.send(JSON.stringify({
                    event: inRegisterEvent,
                    uuid: inPropertyInspectorUUID,
                }));
            };

            websocket.onmessage = function(event) {
                const message = JSON.parse(event.data);
                if (message.event === "updateStreams") {
                    renderStreams(message.streams);
                }
            };
        }

        function renderStreams(streams) {
            const container = document.getElementById("streamList");

            if (!streams || streams.length === 0) {
                container.innerHTML = '<div class="empty-state">No active audio streams found</div>';
                return;
            }

            const currentPid = currentSettings.current_pid;

            container.innerHTML = streams.map(stream => `
                <div class="stream-item">
                    <span class="stream-name">${escapeHtml(stream.app_name || stream.name)}</span>
                    ${stream.pid === currentPid ? '<span class="current-badge">Current</span>' : ''}
                    <div class="stream-pid">PID: ${stream.pid || 'N/A'} | Node: ${stream.node_id}</div>
                </div>
            `).join('');
        }

        function refreshStreams() {
            if (websocket && websocket.readyState === WebSocket.OPEN) {
                websocket.send(JSON.stringify({
                    event: "sendToPlugin",
                    context: context,
                    action: "net.jpreston.opendeck.audio.cycle-stream",
                    payload: { command: "refresh" }
                }));
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
